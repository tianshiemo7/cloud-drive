version: '3.8'

services:
  cloud-drive:
    build: .
    container_name: cloud-drive
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - CLOUD_DRIVE_ADMIN_KEY=${CLOUD_DRIVE_ADMIN_KEY:-cloud2024}
    volumes:
      # 持久化数据
      - ./uploads:/app/uploads
      - ./keys.json:/app/keys.json
      - ./snippets.json:/app/snippets.json
      - ./snippets:/app/snippets
      # 日志
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/api/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 256M
    # 安全加固
    security_opt:
      - no-new-privileges:true
    read_only: false
